{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  labels:
    app: webpage
  annotations:
     {{- range $key, $value := .Values.ingress.annotations }}
     {{ $key }}: {{ $value | quote }}
     {{- end }}
spec:
   ingressClassName: {{ .Values.ingress.ClassName  | default "alb" }}
   rules:
      {{- range .Values.ingress.route }}
     - http:
         paths:
           {{- range .paths }}
           - pathType: {{ .pathtype | default "Prefix" }}
             path : {{ .path }}
           {{- end }}
      {{- end }}
             backend:
                service:
                   name: {{ $.Release.Name }}
                   port:
                      number: 80
{{- end }}

