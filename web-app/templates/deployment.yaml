apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
    replicas: {{ .Values.replicas }}
    selector:
      matchLabels:
        app: webpage
    template:
      metadata:
        name: pod
        labels:
          app: webpage
      spec:
         serviceAccountName: {{ .Values.serviceAccount.name | default "default" }}
         containers:
            - name: app-1
              image: "{{ .Values.image.repository}}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              ports:
                 - containerPort: 80
              livenessProbe:
                    httpGet:
                       path: /
                       port: 80
                    initialDelaySeconds: 5
                    periodSeconds: 10
              readinessProbe:
                    httpGet:
                       path: /
                       port: 80
                    initialDelaySeconds: 5
                    periodSeconds: 5
              startupProbe:
                    httpGet:
                      path: /
                      port: 80
                    failureThreshold: 30
                    periodSeconds: 5
              volumeMounts:
                  - name: storage
                    mountPath: /data
         volumes:
            - name: storage
              persistentVolumeClaim:
                   claimName: pvc

